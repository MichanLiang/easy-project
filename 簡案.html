<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡案 — 簡單的專案管理工具</title>
<style>
:root{
  --bg:#F5F6F8;
  --panel:#FFFFFF;
  --ink:#1E2230;
  --ink-soft:#5B6070;
  --ink-faint:#9BA0AE;
  --line:#E4E6EC;
  --accent:#4B4ACF;
  --accent-soft:#EEEDFB;
  --accent-dark:#3735A8;
  --teal:#1F9E8E;
  --teal-soft:#E4F6F3;
  --amber:#DC8A2C;
  --amber-soft:#FCF0DE;
  --rose:#D65B6B;
  --rose-soft:#FBE9EB;
  --radius:10px;
  --radius-lg:16px;
  --shadow:0 1px 2px rgba(20,20,40,.04), 0 4px 16px rgba(20,20,40,.06);
  --font: "Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;font-size:14px;}
a{color:var(--accent);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D4D7E0;border-radius:8px;}

/* ---------- App shell ---------- */
#app{display:flex;height:100vh;overflow:hidden;}

.sidebar{
  width:220px;flex:none;background:var(--panel);border-right:1px solid var(--line);
  display:flex;flex-direction:column;transition:width .18s ease, padding .18s ease;
  position:relative; z-index:20;
}
.sidebar.collapsed{width:64px;}
.sidebar-head{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--line);}
.sidebar-logo{
  width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#7472E0);
  color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;font-size:15px;
}
.sidebar-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;}
.sidebar.collapsed .sidebar-title, .sidebar.collapsed .navlabel, .sidebar.collapsed .sidebar-user-meta{display:none;}
.collapse-btn{
  margin-left:auto;border:none;background:transparent;color:var(--ink-faint);width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex:none;
}
.sidebar.collapsed .collapse-btn{margin-left:0;}
.collapse-btn:hover{background:var(--bg);}

.nav{flex:1;padding:12px 10px;overflow-y:auto;}
.navitem{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;color:var(--ink-soft);
  font-size:13.5px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;
}
.navitem .ic{width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;}
.navitem:hover{background:var(--bg);color:var(--ink);}
.navitem.active{background:var(--accent-soft);color:var(--accent-dark);}
.nav-sep{height:1px;background:var(--line);margin:10px 6px;}

.sidebar-footer{padding:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.avatar{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;flex:none;
}
.sidebar-user-meta{overflow:hidden;}
.sidebar-user-meta .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-user-meta .role{font-size:11.5px;color:var(--ink-faint);}

.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{
  height:56px;flex:none;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
  padding:0 22px;background:var(--panel);
}
.crumb{font-size:13px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;}
.crumb b{color:var(--ink);font-weight:600;}
.crumb .seg{cursor:pointer;}
.crumb .seg:hover{color:var(--accent);}
.topbar-spacer{flex:1;}

.view{flex:1;overflow-y:auto;padding:26px 30px 60px;}

/* buttons */
.btn{
  border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:8px;
  font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .12s;
}
.btn:hover{border-color:var(--ink-faint);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--bg);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px;}
.btn-danger{color:var(--rose);}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:8px;}

/* headings */
.page-title{font-size:22px;font-weight:800;margin:0 0 4px;}
.page-sub{color:var(--ink-faint);font-size:13.5px;margin:0 0 22px;}
.section-title{font-size:14px;font-weight:700;color:var(--ink-soft);margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title .dot{width:7px;height:7px;border-radius:50%;}

/* cards / grid */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow);}
.grid{display:grid;gap:14px;}
.grid-projects{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}
.grid-docs{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));}

.proj-card{padding:16px;cursor:pointer;position:relative;}
.proj-card:hover{border-color:var(--accent);}
.proj-card .pname{font-weight:700;font-size:14.5px;margin-bottom:6px;}
.proj-card .pmeta{font-size:12px;color:var(--ink-faint);display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.stack{display:flex;}
.stack .avatar{margin-left:-8px;border:2px solid #fff;}
.stack .avatar:first-child{margin-left:0;}

.status-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.status-col-head{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.status-col-head .n{color:var(--ink-faint);font-weight:500;}
.status-col-body{display:flex;flex-direction:column;gap:10px;min-height:60px;}
.status-col-body.dragover{background:var(--accent-soft);border-radius:12px;}

.doc-card{padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:8px;}
.doc-card:hover{border-color:var(--accent);}
.doc-card .dic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.doc-card .dname{font-weight:600;font-size:13.5px;}
.doc-card .dtype{font-size:11.5px;color:var(--ink-faint);}
.addcard{
  border:1.5px dashed var(--line);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;color:var(--ink-faint);font-size:13px;font-weight:600;min-height:120px;cursor:pointer;
}
.addcard:hover{border-color:var(--accent);color:var(--accent);}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start;}
.kcol{background:#F0F1F5;border-radius:14px;padding:12px;min-height:200px;}
.kcol-head{display:flex;align-items:center;justify-content:space-between;padding:2px 4px 12px;}
.kcol-head .t{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;}
.kcol-head .badge{background:#fff;border-radius:20px;font-size:11px;padding:1px 8px;color:var(--ink-faint);font-weight:600;}
.kcard{
  background:#fff;border-radius:11px;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,20,40,.06);
  cursor:grab;border:1px solid transparent;
}
.kcard:hover{border-color:var(--accent);}
.kcard .ktitle{font-size:13px;font-weight:600;margin-bottom:8px;}
.kcard .kmeta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-faint);}
.kcard .kmeta .due{display:flex;align-items:center;gap:4px;}
.kcard.dragging{opacity:.4;}
.kcol-add{width:100%;background:none;border:none;color:var(--ink-faint);font-size:12.5px;font-weight:600;padding:8px;text-align:left;border-radius:8px;}
.kcol-add:hover{background:#fff;color:var(--accent);}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,22,35,.42);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal.wide{max-width:760px;}
.modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:1;}
.modal-head h3{margin:0;font-size:16px;font-weight:700;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
.field input[type=text],.field input[type=date],.field input[type=url],.field textarea,.field select{
  width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:#FBFBFC;color:var(--ink);
}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff;}
.field textarea{resize:vertical;min-height:70px;}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:20px;background:var(--bg);
  font-size:12px;font-weight:600;border:1px solid var(--line);
}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-dark);}
.member-pick{display:flex;flex-wrap:wrap;gap:8px;}
.member-pick .mchip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:20px;border:1px solid var(--line);font-size:12px;font-weight:600;}
.member-pick .mchip.on{border-color:var(--accent);background:var(--accent-soft);}

.empty{
  text-align:center;color:var(--ink-faint);padding:60px 20px;font-size:13.5px;
}
.empty .big{font-size:34px;margin-bottom:10px;}

/* PRD */
.prd-block{margin-bottom:22px;}
.prd-block .lab{font-size:12px;font-weight:800;letter-spacing:.03em;color:var(--accent-dark);background:var(--accent-soft);display:inline-block;padding:3px 10px;border-radius:6px;margin-bottom:8px;}
.feat-list{display:flex;flex-direction:column;gap:8px;}
.feat-row{display:flex;gap:8px;align-items:center;}
.feat-row input{flex:1;}

/* gantt */
.gantt-wrap{overflow-x:auto;}
.gantt{border-collapse:collapse;min-width:700px;width:100%;}
.gantt th{font-size:11px;color:var(--ink-faint);font-weight:600;padding:6px 4px;border-bottom:1px solid var(--line);text-align:center;}
.gantt td{border-bottom:1px solid #F0F1F4;height:38px;position:relative;}
.gantt td.namecell{text-align:left;font-size:12.5px;font-weight:600;padding-left:8px;white-space:nowrap;min-width:150px;position:sticky;left:0;background:#fff;}
.gantt-bar{position:absolute;top:8px;height:22px;border-radius:6px;opacity:.9;}

/* roadmap */
.roadmap{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;}
.rphase{min-width:230px;background:#F0F1F5;border-radius:14px;padding:14px;}
.rphase h4{margin:0 0 4px;font-size:13.5px;}
.rphase .period{font-size:11.5px;color:var(--ink-faint);margin-bottom:10px;}
.ritem{background:#fff;border-radius:9px;padding:8px 10px;font-size:12.5px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);}

/* calendar */
.cal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.cal-dow{font-size:11.5px;color:var(--ink-faint);text-align:center;font-weight:700;padding-bottom:4px;}
.cal-cell{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:92px;padding:6px;font-size:11px;position:relative;}
.cal-cell.other{background:#FAFAFB;color:var(--ink-faint);}
.cal-cell .dnum{font-weight:700;font-size:12px;margin-bottom:4px;}
.cal-cell.today .dnum{color:#fff;background:var(--accent);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cal-item{background:var(--accent-soft);color:var(--accent-dark);border-radius:5px;padding:2px 5px;margin-bottom:3px;font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}

/* todo */
.todo-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
.todo-row:last-child{border-bottom:none;}
.todo-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;cursor:pointer;}
.todo-check.done{background:var(--teal);border-color:var(--teal);}
.todo-main{flex:1;min-width:0;}
.todo-title{font-size:13.5px;font-weight:600;}
.todo-title.done{text-decoration:line-through;color:var(--ink-faint);}
.todo-sub{font-size:11.5px;color:var(--ink-faint);display:flex;gap:10px;margin-top:3px;flex-wrap:wrap;}
.tag{padding:1px 8px;border-radius:20px;font-size:10.5px;font-weight:700;}
.tag.pending{background:var(--bg);color:var(--ink-soft);}
.tag.doing{background:var(--amber-soft);color:var(--amber);}
.tag.testing{background:#E8ECFB;color:#4356C9;}
.tag.done{background:var(--teal-soft);color:var(--teal);}

/* backlog */
.backlog-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.backtab{padding:7px 14px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-soft);}
.backtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.blitem{display:flex;gap:12px;align-items:flex-start;padding:14px;border-bottom:1px solid var(--line);}
.blitem:last-child{border-bottom:none;}
.blkind{padding:2px 9px;border-radius:6px;font-size:11px;font-weight:800;flex:none;}
.blkind.idea{background:var(--teal-soft);color:var(--teal);}
.blkind.bug{background:var(--rose-soft);color:var(--rose);}

/* chat */
.chat-wrap{display:flex;height:calc(100vh - 140px);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;}
.chat-list{width:230px;border-right:1px solid var(--line);overflow-y:auto;flex:none;}
.chat-contact{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #F2F3F6;}
.chat-contact:hover,.chat-contact.active{background:var(--accent-soft);}
.chat-contact .cn{font-size:13px;font-weight:600;}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-head{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;font-size:13.5px;}
.chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:65%;padding:9px 13px;border-radius:14px;font-size:13px;background:var(--bg);align-self:flex-start;}
.msg.me{background:var(--accent);color:#fff;align-self:flex-end;}
.msg .t{font-size:10px;opacity:.65;margin-top:4px;}
.chat-input{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);}
.chat-input input{flex:1;border:1px solid var(--line);border-radius:20px;padding:9px 16px;}

/* canvas boards (userflow / wireframe) */
.board-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.board-wrap{position:relative;border:1px solid var(--line);border-radius:14px;background:
  linear-gradient(#fff,#fff), radial-gradient(circle,#E6E7EC 1px,transparent 1px);
  background-size:100% 100%, 18px 18px; height:560px;overflow:auto;}
.board-canvas{position:relative;width:1600px;height:1200px;}
.node{position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;
  border:2px solid var(--accent);background:#fff;font-size:12.5px;font-weight:600;padding:6px;cursor:move;user-select:none;color:var(--ink);}
.node.rect{border-radius:8px;}
.node.diamond{border-radius:4px;transform-origin:center;}
.node.diamond .txt{transform:none;}
.node .resize{position:absolute;right:-5px;bottom:-5px;width:12px;height:12px;background:var(--accent);border-radius:3px;cursor:nwse-resize;}
.node .del{position:absolute;top:-9px;right:-9px;width:18px;height:18px;border-radius:50%;background:var(--rose);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;line-height:0;}
.node:hover .del{display:flex;}
svg.edges{position:absolute;top:0;left:0;pointer-events:none;}

.wf-el{position:absolute;cursor:move;user-select:none;box-sizing:border-box;}
.wf-el .del{position:absolute;top:-9px;right:-9px;width:18px;height:18px;border-radius:50%;background:var(--rose);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;}
.wf-el:hover .del{display:flex;}
.wf-el .resize{position:absolute;right:-5px;bottom:-5px;width:12px;height:12px;background:var(--ink-soft);border-radius:3px;cursor:nwse-resize;}

/* meeting */
.meeting-item{padding:16px;border-bottom:1px solid var(--line);}
.meeting-item:last-child{border-bottom:none;}
.meeting-item .mt{font-weight:700;font-size:14px;}
.meeting-item .mm{font-size:11.5px;color:var(--ink-faint);margin:4px 0 8px;}
.meeting-item .mc{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;}

/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:820px;}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
.member-row:last-child{border-bottom:none;}

/* misc */
.hint{font-size:12px;color:var(--ink-faint);margin-top:-8px;margin-bottom:16px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;}
.toast.show{opacity:1;}
.icon-btn{border:1px solid var(--line);background:#fff;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.attach-list{display:flex;flex-direction:column;gap:6px;}
.attach-item{display:flex;align-items:center;gap:8px;font-size:12.5px;background:var(--bg);padding:7px 10px;border-radius:8px;}
.attach-item a{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

@media (max-width:900px){
  .status-cols,.kanban{grid-template-columns:repeat(2,1fr);}
  .settings-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
window.DB = null; // filled by app.js content below
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ======================= 簡案 App ======================= */
const LS_KEY = 'jianban_db_v1';

function uid(){return Math.random().toString(36).slice(2,10);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){ if(!d) return ''; const [y,m,day]=d.split('-'); return `${m}/${day}`; }

function seedDB(){
  const meId = uid();
  const members = [
    {id:meId, name:'我', color:'#4B4ACF'},
    {id:uid(), name:'陳品心', color:'#1F9E8E'},
    {id:uid(), name:'林大宇', color:'#DC8A2C'},
    {id:uid(), name:'王小美', color:'#D65B6B'},
  ];
  const teamId2 = members[1].id, teamId3 = members[2].id;
  const projId = uid();
  return {
    currentUser: meId,
    members,
    projects: [
      {
        id: projId, name:'日日小記錄 App', status:'進行中', memberIds:[meId, teamId2, teamId3],
        docs: [
          {id:uid(), type:'prd', name:'PRD 需求文件', goal:'做出一款簡單好上手的每日紀錄工具', background:'市面工具太複雜', value:'純中文、簡單介面', features:['每日打卡','情緒紀錄','週報表']},
          {id:uid(), type:'kanban', name:'開發看板', cards:[
            {id:uid(), title:'Google 登入串接', col:'pending', assignee:teamId2, due:todayStr(), note:'', attachments:[]},

function loadDB(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const db = seedDB();
  saveDB(db);
  return db;
}
function saveDB(db){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }

let DB = loadDB();
function persist(){ saveDB(DB); }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function memberById(id){ return DB.members.find(m=>m.id===id); }
function memberName(id){ const m=memberById(id); return m? m.name : '未知'; }
function initials(name){ return name ? name.slice(0,1) : '?'; }
function avatarHTML(id, size){
  const m = memberById(id); if(!m) return '';

  return `<div class="avatar" style="width:${s}px;height:${s}px;background:${m.color};font-size:${Math.round(s*0.4)}px" title="${m.name}">${initials(m.name)}</div>`;

const state = {
  route: 'projects',   // projects | project | calendar | todos | chat | settings | backlog | meetings

};

function go(route, extra){
  state.route = route;

  render();
}

/* ---------------- Modal helper ---------------- */
function openModal(html, opts){
  closeModal();
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.id = 'modalOverlay';
  wrap.innerHTML = `<div class="modal ${opts&&opts.wide?'wide':''}">${html}</div>`;
  wrap.addEventListener('mousedown', (e)=>{ if(e.target===wrap) closeModal(); });
  document.body.appendChild(wrap);
}
function closeModal(){
  const el = document.getElementById('modalOverlay');
  if(el) el.remove();
}

/* ================= TOPBAR ================= */
function renderTopbar(){
  let crumb = '';
  if(state.route==='project'){
    const p = DB.projects.find(x=>x.id===state.projectId);
    if(!p){ crumb = `<div class="crumb"><span class="seg" onclick="go('projects')">專案管理</span></div>`; }
    else if(state.docId){
      const d = p.docs.find(x=>x.id===state.docId);
      crumb = `<div class="crumb"><span class="seg" onclick="go('projects')">專案管理</span> / <span class="seg" onclick="go('project',{projectId:'${p.id}',docId:null})">${p.name}</span> / <b>${d?d.name:''}</b></div>`;
    } else {
      crumb = `<div class="crumb"><span class="seg" onclick="go('projects')">專案管理</span> / <b>${p.name}</b></div>`;
    }
  } else {
    const found = NAV_ITEMS.find(i=>i.key===state.route);
    crumb = `<div class="crumb"><b>${found?found.label:''}</b></div>`;
  }
  return `<div class="topbar">${crumb}<div class="topbar-spacer"></div></div>`;
}

/* ================= MAIN RENDER ================= */
function render(){
  const app = document.getElementById('app');
  let viewHTML = '';
  switch(state.route){
    case 'projects': viewHTML = viewProjects(); break;
    case 'project': viewHTML = viewProjectDetail(); break;
    case 'calendar': viewHTML = viewCalendar(); break;
    case 'todos': viewHTML = viewTodos(); break;
    case 'backlog': viewHTML = viewBacklog(); break;
    case 'meetings': viewHTML = viewMeetingsGlobal(); break;
    case 'chat': viewHTML = viewChat(); break;
    case 'settings': viewHTML = viewSettings(); break;
    default: viewHTML = viewProjects();
  }
  app.innerHTML = `
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      <div class="view">${viewHTML}</div>
    </div>
  `;
  afterRender();
}
function afterRender(){
  if(state.route==='project'){
    const p = DB.projects.find(x=>x.id===state.projectId);
    const d = p ? p.docs.find(x=>x.id===state.docId) : null;
    if(d && d.type==='userflow') initUserflowBoard(d);
    if(d && d.type==='wireframe') initWireframeBoard(d);
    if(d && d.type==='kanban') initKanbanDnD();
  }
  if(state.route==='chat') scrollChatBottom();
}

  {type:'prd', label:'PRD 模板', icon:'📋', color:'#4356C9'},

function docTypeMeta(type){ return DOC_TYPES.find(d=>d.type===type) || DOC_TYPES[0]; }

function viewProjectDetail(){

function renderDocCard(p,d){
  const meta = docTypeMeta(d.type);
  return `
  <div class="card doc-card" onclick="go('project',{projectId:'${p.id}',docId:'${d.id}'})">
    <div class="dic" style="background:${meta.color}22;color:${meta.color}">${meta.icon}</div>
    <div class="dname">${escapeHTML(d.name)}</div>
    <div class="dtype">${meta.label}</div>
  </div>`;
}
function openAddDocModal(projectId){
  openModal(`
    <div class="modal-head"><h3>新增內容</h3></div>
    <div class="modal-body">
      <div class="grid grid-docs">
        ${DOC_TYPES.map(t=>`
          <div class="card doc-card" onclick="createDoc('${projectId}','${t.type}')">
            <div class="dic" style="background:${t.color}22;color:${t.color}">${t.icon}</div>
            <div class="dname">${t.label}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">取消</button></div>
  `, {wide:true});
}
function createDoc(projectId, type){
  const p = DB.projects.find(x=>x.id===projectId);
  const meta = docTypeMeta(type);
  const base = {id:uid(), type, name:meta.label};
  if(type==='prd') Object.assign(base,{goal:'',background:'',value:'',features:['']});
  if(type==='kanban') Object.assign(base,{cards:[]});
  if(type==='gantt') Object.assign(base,{tasks:[]});
  if(type==='roadmap') Object.assign(base,{phases:[]});
  if(type==='userflow') Object.assign(base,{nodes:[],edges:[]});
  if(type==='wireframe') Object.assign(base,{elements:[]});
  if(type==='doc') Object.assign(base,{content:''});
  if(type==='meeting') Object.assign(base,{date:todayStr(),attendees:'',content:''});
  p.docs.push(base);
  persist(); closeModal();
  go('project',{projectId, docId: base.id});
}
function renameDoc(pId, dId){
  const p = DB.projects.find(x=>x.id===pId); const d = p.docs.find(x=>x.id===dId);
  const nn = prompt('重新命名', d.name);
  if(nn && nn.trim()){ d.name = nn.trim(); persist(); render(); }
}
function deleteDoc(pId,dId){
  if(!confirm('確定刪除這份內容？')) return;
  const p = DB.projects.find(x=>x.id===pId);
  p.docs = p.docs.filter(x=>x.id!==dId);
  persist(); go('project',{projectId:pId, docId:null});
}

function docHeader(p,d){
  const meta = docTypeMeta(d.type);
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div>
      <div class="page-title" style="display:flex;align-items:center;gap:10px;">
        <span>${meta.icon}</span> ${escapeHTML(d.name)}
      </div>
      <div class="page-sub">${p.name} · ${meta.label}</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-sm" onclick="renameDoc('${p.id}','${d.id}')">重新命名</button>
      <button class="btn btn-sm btn-danger" onclick="deleteDoc('${p.id}','${d.id}')">刪除</button>
    </div>
  </div>`;
}
function renderDocView(p,d){
  switch(d.type){
    case 'kanban': return docHeader(p,d) + renderKanban(p,d);
    case 'prd': return docHeader(p,d) + renderPRD(p,d);
    case 'gantt': return docHeader(p,d) + renderGantt(p,d);
    case 'roadmap': return docHeader(p,d) + renderRoadmap(p,d);
    case 'userflow': return docHeader(p,d) + renderUserflow(p,d);
    case 'wireframe': return docHeader(p,d) + renderWireframe(p,d);
    case 'todo': return docHeader(p,d) + renderProjectTodo(p,d);
    case 'meeting': return docHeader(p,d) + renderMeetingDoc(p,d);
    default: return docHeader(p,d) + renderPlainDoc(p,d);
  }
}
function renderPlainDoc(p,d){
  return `<textarea class="card" style="width:100%;min-height:420px;padding:18px;border:1px solid var(--line);font-size:14px;" oninput="updatePlainDoc('${p.id}','${d.id}',this.value)" placeholder="開始輸入文件內容…">${escapeHTML(d.content||'')}</textarea>`;
}
function updatePlainDoc(pId,dId,val){
  const p=DB.projects.find(x=>x.id===pId); const d=p.docs.find(x=>x.id===dId);
  d.content = val; persist();
}

function initKanbanDnD(){

  root.querySelectorAll('.kcard').forEach(card=>{

  });
  root.querySelectorAll('.kcol-drop').forEach(zone=>{
    zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('dragover'); });

      const card = d.cards.find(x=>x.id===dragId);
      if(card){ card.col = zone.dataset.col; persist(); render(); }
    });
  });
}

/* ================= GANTT ================= */
function renderGantt(p,d){
  if(d.tasks.length===0){
    return `<div class="empty"><div class="big">📊</div>還沒有任何任務<br><button class="btn btn-primary" style="margin-top:14px" onclick="openGanttTaskModal('${p.id}','${d.id}')">＋ 新增任務</button></div>`;
  }
  const allDates = d.tasks.flatMap(t=>[new Date(t.start), new Date(t.end)]);
  let minD = new Date(Math.min(...allDates)); let maxD = new Date(Math.max(...allDates));
  minD.setDate(minD.getDate()-1); maxD.setDate(maxD.getDate()+2);
  const totalDays = Math.max(1, Math.round((maxD-minD)/86400000));
  const dayWidth = Math.max(24, Math.min(46, Math.floor(900/totalDays)));
  const days = [];
  for(let i=0;i<totalDays;i++){ const dt=new Date(minD); dt.setDate(dt.getDate()+i); days.push(dt); }
  return `
  <div style="margin-bottom:12px;"><button class="btn btn-primary btn-sm" onclick="openGanttTaskModal('${p.id}','${d.id}')">＋ 新增任務</button></div>
  <div class="gantt-wrap"><table class="gantt" style="min-width:${150+totalDays*dayWidth}px">
    <thead><tr><th style="min-width:150px;position:sticky;left:0;background:#fff;">任務</th>${days.map(dt=>`<th style="width:${dayWidth}px">${dt.getMonth()+1}/${dt.getDate()}</th>`).join('')}</tr></thead>
    <tbody>
      ${d.tasks.map(t=>{
        const startOffset = Math.round((new Date(t.start)-minD)/86400000);
        const span = Math.max(1, Math.round((new Date(t.end)-new Date(t.start))/86400000));
        return `<tr onclick="openGanttTaskModal('${p.id}','${d.id}','${t.id}')" style="cursor:pointer">
          <td class="namecell">${escapeHTML(t.title)}</td>
          <td colspan="${totalDays}" style="position:relative;padding:0;">
            <div class="gantt-bar" style="left:${startOffset*dayWidth}px;width:${span*dayWidth-4}px;background:${t.color||'#4B4ACF'}"></div>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function renderUserflow(p,d){
  return `

      ${d.nodes.map(n=>renderUFNode(n)).join('')}
    </div>
  </div>`;
}
function renderUFNode(n){
  const shapeStyle = n.shape==='diamond' ? `clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);border-radius:0;` : '';
  return `
  <div class="node ${n.shape}" id="node-${n.id}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px;${shapeStyle}">
    <div class="txt" contenteditable="true" style="width:100%;outline:none;" onblur="updateUFNodeText('${n.id}',this.textContent)" onmousedown="event.stopPropagation()">${escapeHTML(n.text)}</div>
    <div class="del" onmousedown="event.stopPropagation()" onclick="deleteUFNode('${n.id}')">✕</div>
    <div class="resize" onmousedown="event.stopPropagation();startUFResize(event,'${n.id}')"></div>
  </div>`;
}
let ufState = null;
function initUserflowBoard(d){
  const canvas = document.getElementById('ufCanvas');
  if(!canvas) return;
  const pid = canvas.dataset.pid, did = canvas.dataset.did;
  ufState = {pid, did, connectFrom:null, drag:null, resize:null};
  drawUFEdges(d);
  canvas.querySelectorAll('.node').forEach(nodeEl=>{
    nodeEl.addEventListener('mousedown', (e)=>{
      if(e.target.closest('.del')||e.target.closest('.resize')) return;
      const id = nodeEl.dataset.id;
      if(e.shiftKey){
        // connect mode
        if(ufState.connectFrom && ufState.connectFrom!==id){
          const proj = DB.projects.find(x=>x.id===pid); const doc = proj.docs.find(x=>x.id===did);
          doc.edges.push({from:ufState.connectFrom, to:id}); persist(); ufState.connectFrom=null; render();
        } else { ufState.connectFrom = id; toast('已選取起點，按住 Shift 點擊另一個節點以連線'); }
        return;
      }
      const rect = canvas.getBoundingClientRect();
      ufState.drag = {id, offX: e.clientX - rect.left - nodeEl.offsetLeft, offY: e.clientY - rect.top - nodeEl.offsetTop};
    });
  });
  canvas.onmousemove = (e)=>{
    if(ufState.drag){
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left - ufState.drag.offX;
      const y = e.clientY - rect.top - ufState.drag.offY;
      const el = document.getElementById('node-'+ufState.drag.id);
      el.style.left = Math.max(0,x)+'px'; el.style.top = Math.max(0,y)+'px';
      const proj = DB.projects.find(x=>x.id===pid); const doc = proj.docs.find(x=>x.id===did);
      const n = doc.nodes.find(nn=>nn.id===ufState.drag.id); n.x=Math.max(0,x); n.y=Math.max(0,y);
      drawUFEdges(doc);
    }
    if(ufState.resize){
      const el = document.getElementById('node-'+ufState.resize.id);
      const w = Math.max(70, ufState.resize.startW + (e.clientX - ufState.resize.startX));
      const h = Math.max(44, ufState.resize.startH + (e.clientY - ufState.resize.startY));
      el.style.width=w+'px'; el.style.height=h+'px';
      const proj = DB.projects.find(x=>x.id===pid); const doc = proj.docs.find(x=>x.id===did);
      const n = doc.nodes.find(nn=>nn.id===ufState.resize.id); n.w=w; n.h=h;
      drawUFEdges(doc);
    }
  };
  canvas.onmouseup = ()=>{
    if(ufState.drag||ufState.resize) persist();
    ufState.drag=null; ufState.resize=null;
  };
  canvas.onmouseleave = ()=>{ };
}
function startUFResize(e,id){
  const el = document.getElementById('node-'+id);
  ufState.resize = {id, startX:e.clientX, startY:e.clientY, startW:el.offsetWidth, startH:el.offsetHeight};
}
function drawUFEdges(d){
  const svg = document.getElementById('ufEdgesSvg');
  if(!svg) return;
  svg.innerHTML = `<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4B4ACF"/></marker></defs>`;
  d.edges.forEach(e=>{
    const a = d.nodes.find(n=>n.id===e.from), b = d.nodes.find(n=>n.id===e.to);
    if(!a||!b) return;
    const x1=a.x+a.w/2, y1=a.y+a.h/2, x2=b.x+b.w/2, y2=b.y+b.h/2;
    svg.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#4B4ACF" stroke-width="2" marker-end="url(#arrow)"/>`;
  });
}
function addUFNode(pId,dId,shape){
  const p=DB.projects.find(x=>x.id===pId); const d=p.docs.find(x=>x.id===dId);
  d.nodes.push({id:uid(), shape, x:80+Math.random()*300, y:80+Math.random()*200, w: shape==='diamond'?130:120, h: shape==='diamond'?80:56, text: shape==='diamond'?'條件？':'步驟'});
  persist(); render();

function updateUFNodeText(id,text){

const WF_SHAPES = [
  {shape:'rect', label:'方形區塊'}, {shape:'square', label:'正方形'}, {shape:'circle', label:'圓形'},
  {shape:'button', label:'按鈕'}, {shape:'text', label:'文字'},

function renderWireframe(p,d){

}
function wfShapeStyle(el){
  const base = 'background:#F7F8FA;border:2px solid var(--ink-soft);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink-soft);font-weight:600;';
  if(el.shape==='circle') return base+'border-radius:50%;';
  if(el.shape==='button') return base+'border-radius:20px;background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;';
  if(el.shape==='text') return 'border:1px dashed #C7CAD3;display:flex;align-items:center;padding-left:6px;font-size:13px;color:var(--ink-soft);';
  return base+'border-radius:4px;';
}
function renderWFElement(el){
  return `
  <div class="wf-el" id="wfel-${el.id}" data-id="${el.id}" style="left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;${wfShapeStyle(el)}">
    <span contenteditable="true" onmousedown="event.stopPropagation()" onblur="updateWFText('${el.id}',this.textContent)" style="outline:none;width:100%;text-align:center;">${escapeHTML(el.text||'')}</span>
    <div class="del" onmousedown="event.stopPropagation()" onclick="deleteWFElement('${el.id}')">✕</div>
    <div class="resize" onmousedown="event.stopPropagation();startWFResize(event,'${el.id}')"></div>
  </div>`;
}
let wfState = null;
function initWireframeBoard(d){
  const canvas = document.getElementById('wfCanvas');
  if(!canvas) return;
  const pid = canvas.dataset.pid, did = canvas.dataset.did;
  wfState = {pid, did, drag:null, resize:null};
  canvas.querySelectorAll('.wf-el').forEach(elDiv=>{
    elDiv.addEventListener('mousedown', (e)=>{
      if(e.target.closest('.del')||e.target.closest('.resize')) return;
      const rect = canvas.getBoundingClientRect();
      wfState.drag = {id: elDiv.dataset.id, offX: e.clientX-rect.left-elDiv.offsetLeft, offY: e.clientY-rect.top-elDiv.offsetTop};
    });
  });
  canvas.onmousemove = (e)=>{
    if(wfState.drag){
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(0, e.clientX-rect.left-wfState.drag.offX);
      const y = Math.max(0, e.clientY-rect.top-wfState.drag.offY);
      const el = document.getElementById('wfel-'+wfState.drag.id);
      el.style.left=x+'px'; el.style.top=y+'px';
      const proj = DB.projects.find(x2=>x2.id===pid); const doc = proj.docs.find(x2=>x2.id===did);
      const item = doc.elements.find(it=>it.id===wfState.drag.id); item.x=x; item.y=y;
    }
    if(wfState.resize){
      const el = document.getElementById('wfel-'+wfState.resize.id);
      const w = Math.max(30, wfState.resize.startW + (e.clientX-wfState.resize.startX));
      const h = Math.max(24, wfState.resize.startH + (e.clientY-wfState.resize.startY));
      el.style.width=w+'px'; el.style.height=h+'px';
      const proj = DB.projects.find(x2=>x2.id===pid); const doc = proj.docs.find(x2=>x2.id===did);
      const item = doc.elements.find(it=>it.id===wfState.resize.id); item.w=w; item.h=h;
    }
  };
  canvas.onmouseup = ()=>{ if(wfState.drag||wfState.resize) persist(); wfState.drag=null; wfState.resize=null; };
}
function startWFResize(e,id){
  const el = document.getElementById('wfel-'+id);
  wfState.resize = {id, startX:e.clientX, startY:e.clientY, startW:el.offsetWidth, startH:el.offsetHeight};
}
function addWFElement(pId,dId,shape){
  const p=DB.projects.find(x=>x.id===pId); const d=p.docs.find(x=>x.id===dId);
  const defaults = {rect:{w:160,h:100,text:'區塊'}, square:{w:100,h:100,text:'方塊'}, circle:{w:90,h:90,text:'圖示'}, button:{w:120,h:40,text:'按鈕文字'}, text:{w:150,h:26,text:'文字內容'}};
  const def = defaults[shape];
  d.elements.push({id:uid(), shape, x:60+Math.random()*300, y:60+Math.random()*200, w:def.w, h:def.h, text:def.text});
  persist(); render();
}
function updateWFText(id,text){
  for(const p of DB.projects) for(const d of p.docs) if(d.type==='wireframe'){
    const el = d.elements.find(x=>x.id===id); if(el){ el.text=text.trim(); persist(); return; }
  }
}
function deleteWFElement(id){
  for(const p of DB.projects) for(const d of p.docs) if(d.type==='wireframe'){
    const idx = d.elements.findIndex(x=>x.id===id);
    if(idx>-1){ d.elements.splice(idx,1); persist(); render(); return; }
  }
}
function exportWireframe(dId){
  const canvas = document.getElementById('wfCanvas');
  if(!canvas || typeof html2canvas==='undefined'){ toast('圖片匯出功能需要網路連線'); return; }
  html2canvas(canvas, {backgroundColor:'#ffffff'}).then(c=>{
    const link = document.createElement('a');
    link.download = 'wireframe.png';
    link.href = c.toDataURL('image/png');
    link.click();
    toast('已匯出圖片');
  }).catch(()=>toast('匯出失敗，請確認網路連線'));
}
function shareWireframe(pId,dId){
  const url = location.href.split('#')[0] + '#project='+pId+'&doc='+dId;
  navigator.clipboard && navigator.clipboard.writeText(url);

/* ================= CALENDAR ================= */
const WEEKDAYS = ['日','一','二','三','四','五','六'];
function viewCalendar(){
  const y = state.calYear, m = state.calMonth;
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays = new Date(y,m,0).getDate();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push({day: prevDays-startDow+1+i, other:true});
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i, other:false});
  while(cells.length%7!==0 || cells.length<42) cells.push({day: cells.length - startDow - daysInMonth + 1, other:true});
  const monthTodos = DB.todos.filter(t=>t.date);
  const todayISO = todayStr();
  return `
  <div class="page-title">行事曆</div>
  <div class="page-sub">檢視所有帶有日期的待辦事項</div>
  <div class="cal-head">
    <button class="btn btn-sm" onclick="calNav(-1)">‹ 上個月</button>
    <div style="font-weight:800;font-size:16px;">${y} 年 ${m+1} 月</div>
    <button class="btn btn-sm" onclick="calNav(1)">下個月 ›</button>
    <button class="btn btn-sm" onclick="calToday()">回到今天</button>
  </div>
  <div class="cal-grid">
    ${WEEKDAYS.map(w=>`<div class="cal-dow">${w}</div>`).join('')}
    ${cells.map(c=>{
      const iso = c.other? '' : `${y}-${String(m+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
      const items = iso ? monthTodos.filter(t=>t.date===iso) : [];
      const isToday = iso===todayISO;
      return `<div class="cal-cell ${c.other?'other':''} ${isToday?'today':''}">
        <div class="dnum">${c.day}</div>
        ${items.map(t=>`<div class="cal-item" onclick="openTodoModal('${t.id}')" title="${escapeHTML(t.title)}">${escapeHTML(t.title)}</div>`).join('')}
      </div>`;
    }).join('')}
  </div>`;
}
function calNav(dir){
  state.calMonth += dir;
  if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
  if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
  render();
}
function calToday(){ const n=new Date(); state.calMonth=n.getMonth(); state.calYear=n.getFullYear(); render(); }

    <div class="field-row">
      <div class="field"><label>日期</label><input type="date" value="${d.date||''}" oninput="updateMeetingField('${p.id}','${d.id}','date',this.value)"></div>
      <div class="field"><label>出席人員</label><input type="text" value="${escapeHTML(d.attendees||'')}" placeholder="例如：我、陳品心" oninput="updateMeetingField('${p.id}','${d.id}','attendees',this.value)"></div>
    </div>
    <div class="field"><label>會議內容</label><textarea style="min-height:260px" placeholder="記錄會議重點、決議事項…" oninput="updateMeetingField('${p.id}','${d.id}','content',this.value)">${escapeHTML(d.content||'')}</textarea></div>
  </div>`;
}
function updateMeetingField(pId,dId,field,val){
  const p=DB.projects.find(x=>x.id===pId); const d=p.docs.find(x=>x.id===dId);
  d[field]=val; persist();
}
function viewMeetingsGlobal(){
  const projMeetings = DB.projects.flatMap(p=>p.docs.filter(d=>d.type==='meeting').map(d=>({...d, projectId:p.id, projectName:p.name})));
  const standalone = DB.meetings;
  const all = [...standalone.map(m=>({...m, projectName:null})), ...projMeetings].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="page-title">會議記錄</div><div class="page-sub">可隸屬於各專案，也可以獨立記錄速記</div></div>
    <button class="btn btn-primary" onclick="openStandaloneMeetingModal()">＋ 新增速記</button>
  </div>
  <div class="card">
    ${all.length? all.map(m=>`
      <div class="meeting-item" style="cursor:${m.projectId?'pointer':'default'}" ${m.projectId?`onclick="go('project',{projectId:'${m.projectId}',docId:'${m.id}'})"`:''}>
        <div style="display:flex;justify-content:space-between;">
          <div class="mt">${escapeHTML(m.name||m.title||'速記')}</div>
          ${!m.projectId?`<button class="btn-ghost btn-icon btn-sm" onclick="event.stopPropagation();deleteStandaloneMeeting('${m.id}')">✕</button>`:''}
        </div>
        <div class="mm">${m.date||''} ${m.attendees?(' · '+escapeHTML(m.attendees)):''} ${m.projectName?(' · 🗂️ '+escapeHTML(m.projectName)):' · 獨立速記'}</div>
        <div class="mc">${escapeHTML((m.content||'').slice(0,140))}${(m.content||'').length>140?'…':''}</div>
      </div>
    `).join('') : `<div class="empty">還沒有任何會議記錄</div>`}
  </div>`;
}
function openStandaloneMeetingModal(){
  openModal(`
    <div class="modal-head"><h3>新增速記</h3></div>
    <div class="modal-body">
      <div class="field"><label>標題</label><input type="text" id="smTitle" placeholder="會議或速記標題"></div>
      <div class="field-row">
        <div class="field"><label>日期</label><input type="date" id="smDate" value="${todayStr()}"></div>
        <div class="field"><label>出席人員</label><input type="text" id="smAttendees" placeholder="選填"></div>
      </div>
      <div class="field"><label>內容</label><textarea id="smContent" style="min-height:160px" placeholder="快速記下重點…"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveStandaloneMeeting()">儲存</button></div>
  `);
}
function saveStandaloneMeeting(){
  const title = document.getElementById('smTitle').value.trim();
  if(!title){ toast('請輸入標題'); return; }
  DB.meetings.push({id:uid(), title, date:document.getElementById('smDate').value, attendees:document.getElementById('smAttendees').value, content:document.getElementById('smContent').value});
  persist(); closeModal(); render();
}
function deleteStandaloneMeeting(id){
  DB.meetings = DB.meetings.filter(x=>x.id!==id);
  persist(); render();
}

/* ================= CHAT ================= */
function viewChat(){
  const contacts = DB.members.filter(m=>m.id!==DB.currentUser);
  if(!state.chatContact && contacts.length) state.chatContact = contacts[0].id;
  const thread = DB.chats[state.chatContact] || [];
  return `
  <div class="page-title">聊天室</div>
  <div class="page-sub">與團隊成員即時溝通、指派任務</div>
  <div class="chat-wrap">
    <div class="chat-list">
      ${contacts.map(c=>`
        <div class="chat-contact ${state.chatContact===c.id?'active':''}" onclick="selectChatContact('${c.id}')">
          ${avatarHTML(c.id,32)}
          <div><div class="cn">${c.name}</div></div>
        </div>`).join('')}
    </div>
    <div class="chat-main">
      <div class="chat-head">${state.chatContact? memberName(state.chatContact) : '選擇聯絡人'}</div>
      <div class="chat-msgs" id="chatMsgs">
        ${thread.map(m=>`<div class="msg ${m.from==='me'?'me':''}">${escapeHTML(m.text)}<div class="t">${m.time}</div></div>`).join('') || '<div class="empty">開始你們的對話吧</div>'}
      </div>
      <div class="chat-input">
        <input type="text" id="chatInputBox" placeholder="輸入訊息…" onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button class="btn btn-primary" onclick="sendChatMsg()">傳送</button>
      </div>
    </div>
  </div>`;
}
function selectChatContact(id){ state.chatContact = id; render(); }
function sendChatMsg(){
  const box = document.getElementById('chatInputBox');
  const text = box.value.trim();
  if(!text) return;
  const cid = state.chatContact;
  if(!DB.chats[cid]) DB.chats[cid]=[];
  const now = new Date(); const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  DB.chats[cid].push({from:'me', text, time});
  persist();
  render();
  setTimeout(()=>{ document.getElementById('chatInputBox') && document.getElementById('chatInputBox').focus(); },0);
}
function scrollChatBottom(){
  const el = document.getElementById('chatMsgs');
  if(el) el.scrollTop = el.scrollHeight;
}

/* ================= SETTINGS ================= */
function viewSettings(){
  const me = memberById(DB.currentUser);
  return `
  <div class="page-title">個人設定</div>
  <div class="page-sub">管理你的個人資訊與團隊成員</div>
  <div class="settings-grid">
    <div class="card" style="padding:20px;">
      <div class="section-title" style="margin-top:0">我的帳號</div>
      <div class="field"><label>顯示名稱</label><input type="text" id="meName" value="${escapeHTML(me.name)}"></div>
      <div class="field"><label>顏色標籤</label>
        <div class="chip-row">${['#4B4ACF','#1F9E8E','#DC8A2C','#D65B6B','#4356C9'].map(c=>`<div onclick="pickMeColor(this,'${c}')" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===me.color?'#000':'transparent'}"></div>`).join('')}</div>
        <input type="hidden" id="meColor" value="${me.color}">
      </div>
      <button class="btn btn-primary" onclick="saveMyProfile()">儲存</button>
    </div>
    <div class="card" style="padding:20px;">
      <div class="section-title" style="margin-top:0;justify-content:space-between;display:flex;">
        <span>團隊成員</span>
        <button class="btn btn-sm" onclick="addMember()">＋ 新增成員</button>
      </div>
      ${DB.members.filter(m=>m.id!==DB.currentUser).map(m=>`
        <div class="member-row">
          ${avatarHTML(m.id,32)}
          <div style="flex:1">${escapeHTML(m.name)}</div>
          <button class="btn-ghost btn-icon btn-sm" onclick="removeMember('${m.id}')">✕</button>
        </div>`).join('') || `<div class="empty">尚無其他成員</div>`}
    </div>
  </div>
  <div class="hint" style="margin-top:20px;max-width:820px;">＊ 此工具為單機示範版本（資料儲存在本機瀏覽器 localStorage），「共用協作」與「指派任務」以模擬團隊成員的方式呈現；如需真正多人即時協作，需要串接後端與帳號系統。</div>
  `;
}
function pickMeColor(el,c){ document.getElementById('meColor').value=c; el.parentElement.querySelectorAll('div').forEach(x=>x.style.border='2px solid transparent'); el.style.border='2px solid #000'; }
function saveMyProfile(){
  const me = memberById(DB.currentUser);
  me.name = document.getElementById('meName').value.trim() || me.name;
  me.color = document.getElementById('meColor').value;
  persist(); toast('已儲存'); render();
}
function addMember(){
  const name = prompt('成員姓名');
  if(name && name.trim()){
    const colors=['#4B4ACF','#1F9E8E','#DC8A2C','#D65B6B','#4356C9'];
    DB.members.push({id:uid(), name:name.trim(), color: colors[DB.members.length%colors.length]});
    persist(); render();
  }
}
function removeMember(id){
  if(!confirm('確定移除此成員？')) return;
  DB.members = DB.members.filter(m=>m.id!==id);
  persist(); render();
}

/* ================= INIT ================= */
render();
</script>
</body>
</html>
